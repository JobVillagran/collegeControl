name: University Monitor

on:
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send summary email"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      days_ahead_warning:
        description: "Upcoming deadline window in days"
        required: true
        default: "3"
        type: string

  schedule:
    # Wednesday, Thursday, Friday, Saturday, Sunday
    # 7:00 AM Guatemala = 13:00 UTC
    - cron: "0 13 * * 3,4,5,6,0"

    # 1:00 PM Guatemala = 19:00 UTC
    - cron: "0 19 * * 3,4,5,6,0"

    # 7:00 PM Guatemala = 01:00 UTC next day
    # For local GT days Wed, Thu, Fri, Sat, Sun -> UTC days Thu, Fri, Sat, Sun, Mon
    - cron: "0 1 * * 1,4,5,6,0"

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          APP_TIMEZONE: ${{ secrets.APP_TIMEZONE }}
          DAYS_AHEAD_WARNING: ${{ github.event.inputs.days_ahead_warning || '3' }}
          SEND_EMAIL: ${{ github.event.inputs.send_email || 'true' }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          python -m src.main

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: university-monitor-reports
          path: |
            reports/
            data/processed/
            data/snapshots/
            data/logs/
            storage/
          if-no-files-found: ignore