name: Diagnose Existing Canvas Secret

on:
  push:
    branches:
      - hotfix/courses
    paths:
      - ".github/workflows/diagnose-existing-canvas-secret.yml"

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Test existing secrets safely
        env:
          CANVAS_BASE_URL: ${{ secrets.CANVAS_BASE_URL }}
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          APP_ACCESS_KEY: ${{ secrets.APP_ACCESS_KEY }}
        run: |
          python3 - <<'PY'
          from hashlib import sha256
          from urllib.error import HTTPError
          from urllib.request import Request, urlopen
          import os


          def fingerprint(value: str) -> str:
              if not value:
                  return "(missing)"

              return sha256(
                  value.encode("utf-8")
              ).hexdigest()[:12]


          canvas_base_url = (
              os.environ.get("CANVAS_BASE_URL")
              or "https://miumg.instructure.com"
          ).rstrip("/")

          canvas_token = os.environ.get(
              "CANVAS_API_TOKEN",
              "",
          )

          app_key = os.environ.get(
              "APP_ACCESS_KEY",
              "",
          )

          print(
              "APP_ACCESS_KEY_PRESENT=",
              bool(app_key),
              sep="",
          )
          print(
              "APP_ACCESS_KEY_LENGTH=",
              len(app_key),
              sep="",
          )
          print(
              "APP_ACCESS_KEY_FINGERPRINT=",
              fingerprint(app_key),
              sep="",
          )

          print(
              "CANVAS_API_TOKEN_PRESENT=",
              bool(canvas_token),
              sep="",
          )
          print(
              "CANVAS_API_TOKEN_LENGTH=",
              len(canvas_token),
              sep="",
          )
          print(
              "CANVAS_API_TOKEN_FINGERPRINT=",
              fingerprint(canvas_token),
              sep="",
          )

          if not canvas_token:
              print("CANVAS_STATUS=NOT_TESTED")
              print("RESULT=CANVAS_API_TOKEN_MISSING")
              raise SystemExit(0)

          request = Request(
              (
                  canvas_base_url
                  + "/api/v1/courses?per_page=1"
              ),
              headers={
                  "Authorization":
                      f"Bearer {canvas_token}",
                  "Accept":
                      "application/json",
              },
          )

          try:
              with urlopen(
                  request,
                  timeout=20,
              ) as response:
                  status = response.status
          except HTTPError as exc:
              status = exc.code
          except Exception as exc:
              print(
                  "CANVAS_ERROR_TYPE=",
                  type(exc).__name__,
                  sep="",
              )
              print("CANVAS_STATUS=ERROR")
              print("RESULT=NETWORK_OR_TIMEOUT_ERROR")
              raise SystemExit(0)

          print(
              "CANVAS_STATUS=",
              status,
              sep="",
          )

          if status == 200:
              print("RESULT=EXISTING_SECRET_IS_VALID")
          elif status == 401:
              print("RESULT=EXISTING_SECRET_WAS_REJECTED")
          elif status == 403:
              print("RESULT=EXISTING_SECRET_FORBIDDEN")
          else:
              print("RESULT=UNEXPECTED_CANVAS_RESPONSE")
          PY
